<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ranCheck</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: #1a1e2b;
            color: white;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            background: #2a2f3f;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-button.active {
            background: #4c9aff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input {
            background: #0f1219;
            border: 1px solid #4c9aff;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            min-width: 250px;
        }
        button {
            background: #4c9aff;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 70vh;
            border-radius: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1219;
            min-width: 600px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2f3f;
            vertical-align: top;
            word-break: break-word;
            white-space: normal;
        }
        th {
            background: #4c9aff;
            position: sticky;
            top: 0;
        }
        td {
            font-family: monospace;
            font-size: 0.85rem;
        }
        .no-data {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>📊 Админ-панель ranCheck</h1>
    <div class="tabs">
        <button class="tab-button active" data-tab="telegram">📱 Логи Telegram</button>
        <button class="tab-button" data-tab="web">🌐 Логи сайта</button>
    </div>

    <div id="telegram" class="tab-content active">
        <h2>Логи сообщений Telegram-бота</h2>
        <div class="search-container">
            <input type="text" id="tgSearch" placeholder="Поиск по username или user_id...">
            <button id="tgSearchBtn">🔍 Найти</button>
            <button id="tgResetBtn">🔄 Сброс</button>
        </div>
        <div class="table-wrapper">
            <table id="telegramTable">
                <thead>
                    <tr><th>User ID</th><th>Username</th><th>Сообщение</th><th>Ответ бота</th><th>Время</th></tr>
                </thead>
                <tbody id="tgLogsBody">
                    <tr><td colspan="5" class="no-data">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="web" class="tab-content">
        <h2>Логи действий на сайте</h2>
        <div class="search-container">
            <input type="text" id="webSearch" placeholder="Поиск по IP...">
            <button id="webSearchBtn">🔍 Найти</button>
            <button id="webResetBtn">🔄 Сброс</button>
        </div>
        <div class="table-wrapper">
            <table id="webTable">
                <thead>
                    <tr><th>IP</th><th>Введённый код</th><th>Загруженные моды</th><th>Ответ сайта</th><th>Время</th></tr>
                </thead>
                <tbody id="webLogsBody">
                    <tr><td colspan="5" class="no-data">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "";  // текущий сервер

        async function loadTelegramLogs(search = '') {
            let url = `/api/telegram-logs`;
            if (search) {
                if (/^\d+$/.test(search)) url += `?user_id=${search}`;
                else url += `?username=${search}`;
            }
            try {
                const response = await fetch(url, { credentials: 'include' });
                if (response.status === 401) {
                    alert("Требуется авторизация. Обновите страницу и введите логин/пароль.");
                    return;
                }
                const data = await response.json();
                const tbody = document.getElementById('tgLogsBody');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="no-data">Нет записей</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                for (const log of data) {
                    const row = `<tr>
                        <td>${log.user_id}</td>
                        <td>${escapeHtml(log.username || '—')}</td>
                        <td>${escapeHtml(log.message)}</td>
                        <td>${escapeHtml(log.bot_response)}</td>
                        <td>${new Date(log.timestamp).toLocaleString()}</td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                }
            } catch(e) {
                console.error(e);
                document.getElementById('tgLogsBody').innerHTML = '<tr><td colspan="5" class="no-data">Ошибка загрузки</td></tr>';
            }
        }

        async function loadWebLogs(ip = '') {
            let url = `/api/web-logs`;
            if (ip) url += `?ip=${ip}`;
            try {
                const response = await fetch(url, { credentials: 'include' });
                if (response.status === 401) {
                    alert("Требуется авторизация.");
                    return;
                }
                const data = await response.json();
                const tbody = document.getElementById('webLogsBody');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="no-data">Нет записей</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                for (const log of data) {
                    const row = `<tr>
                        <td>${escapeHtml(log.ip_address || '—')}</td>
                        <td>${escapeHtml(log.entered_code)}</td>
                        <td>${escapeHtml(log.uploaded_mods || '—')}</td>
                        <td>${escapeHtml(log.site_response)}</td>
                        <td>${new Date(log.timestamp).toLocaleString()}</td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                }
            } catch(e) {
                console.error(e);
                document.getElementById('webLogsBody').innerHTML = '<tr><td colspan="5" class="no-data">Ошибка загрузки</td></tr>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });

        document.getElementById('tgSearchBtn').addEventListener('click', () => {
            loadTelegramLogs(document.getElementById('tgSearch').value.trim());
        });
        document.getElementById('tgResetBtn').addEventListener('click', () => {
            document.getElementById('tgSearch').value = '';
            loadTelegramLogs();
        });
        document.getElementById('webSearchBtn').addEventListener('click', () => {
            loadWebLogs(document.getElementById('webSearch').value.trim());
        });
        document.getElementById('webResetBtn').addEventListener('click', () => {
            document.getElementById('webSearch').value = '';
            loadWebLogs();
        });

        loadTelegramLogs();
        loadWebLogs();
    </script>
</body>
</html>
