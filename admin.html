<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ranCheck</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: #1a1e2b;
            color: white;
            padding: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            background: #2a2f3f;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .tab-button.active {
            background: #4c9aff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1219;
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2f3f;
        }
        th {
            background: #4c9aff;
        }
        input {
            background: #0f1219;
            border: 1px solid #4c9aff;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            margin-bottom: 15px;
            width: 300px;
        }
        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #4c9aff;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>📊 Админ-панель ranCheck</h1>
    <div class="tabs">
        <button class="tab-button active" data-tab="telegram">📱 Логи Telegram</button>
        <button class="tab-button" data-tab="web">🌐 Логи сайта</button>
    </div>

    <div id="telegram" class="tab-content active">
        <h2>Логи сообщений Telegram-бота</h2>
        <div class="search-container">
            <input type="text" id="tgSearch" placeholder="Поиск по username или user_id...">
            <button id="tgSearchBtn">🔍 Найти</button>
            <button id="tgResetBtn">🔄 Сброс</button>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Username</th><th>Сообщение</th><th>Ответ бота</th><th>Время</th></tr>
            </thead>
            <tbody id="tgLogsBody"></tbody>
        </table>
    </div>

    <div id="web" class="tab-content">
        <h2>Логи действий на сайте</h2>
        <div class="search-container">
            <input type="text" id="webSearch" placeholder="Поиск по IP...">
            <button id="webSearchBtn">🔍 Найти</button>
            <button id="webResetBtn">🔄 Сброс</button>
        </div>
        <table>
            <thead>
                <tr><th>IP</th><th>Введённый код</th><th>Загруженные моды</th><th>Ответ сайта</th><th>Время</th></tr>
            </thead>
            <tbody id="webLogsBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = "";  // пустой, так как страница загружена с того же сервера

        async function loadTelegramLogs(search = '') {
            let url = `${API_BASE}/api/telegram-logs`;
            if (search) {
                if (/^\d+$/.test(search)) url += `?user_id=${search}`;
                else url += `?username=${search}`;
            }
            const response = await fetch(url, { credentials: 'include' });
            if (response.status === 401) {
                alert("Требуется авторизация. Обновите страницу и введите логин/пароль.");
                return;
            }
            const data = await response.json();
            const tbody = document.getElementById('tgLogsBody');
            tbody.innerHTML = '';
            for (const log of data) {
                const row = `<tr>
                    <tr>${log.user_id}</td>
                    <td>${log.username || '—'}</td>
                    <td>${escapeHtml(log.message)}</td>
                    <｜point｜>${escapeHtml(log.bot_response)}</td>
                    <td>${new Date(log.timestamp).toLocaleString()}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            }
        }

        async function loadWebLogs(ip = '') {
            let url = `${API_BASE}/api/web-logs`;
            if (ip) url += `?ip=${ip}`;
            const response = await fetch(url, { credentials: 'include' });
            if (response.status === 401) {
                alert("Требуется авторизация.");
                return;
            }
            const data = await response.json();
            const tbody = document.getElementById('webLogsBody');
            tbody.innerHTML = '';
            for (const log of data) {
                const row = `<tr>
                    <td>${log.ip_address || '—'}</td>
                    <td>${log.entered_code}</td>
                    <td>${escapeHtml(log.uploaded_mods || '—')}</td>
                    <td>${escapeHtml(log.site_response)}</td>
                    <td>${new Date(log.timestamp).toLocaleString()}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Вкладки
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Поиск
        document.getElementById('tgSearchBtn').addEventListener('click', () => {
            loadTelegramLogs(document.getElementById('tgSearch').value.trim());
        });
        document.getElementById('tgResetBtn').addEventListener('click', () => {
            document.getElementById('tgSearch').value = '';
            loadTelegramLogs();
        });
        document.getElementById('webSearchBtn').addEventListener('click', () => {
            loadWebLogs(document.getElementById('webSearch').value.trim());
        });
        document.getElementById('webResetBtn').addEventListener('click', () => {
            document.getElementById('webSearch').value = '';
            loadWebLogs();
        });

        // Загрузка при старте
        loadTelegramLogs();
        loadWebLogs();
    </script>
</body>
</html>
